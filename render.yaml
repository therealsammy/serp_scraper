# Render blueprint: backend (Docker) + managed Postgres + Redis.
# Deploy by pointing Render at this repo ("New + → Blueprint").
# The frontend deploys separately on Vercel (see DEPLOY.md).

services:
  - type: web
    name: serp-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free               # free web service sleeps when idle; bump for always-on demos
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false          # Supabase Postgres connection string (set in dashboard)
      - key: REDIS_URL
        sync: false          # Upstash Redis URL (rediss://...) — set in dashboard
      - key: FRONTEND_ORIGIN
        sync: false          # set to your Vercel URL, e.g. https://serp.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_BOOTSTRAP_EMAIL
        sync: false
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      # Provider keys — set in the Render dashboard (sync:false keeps them out of git)
      - key: APIFY_API_TOKEN
        sync: false
      - key: BRAVE_API_KEY
        sync: false
      - key: SERPER_API_KEY
        sync: false
      - key: SCALESERP_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
      - key: GOOGLE_NL_API_KEY
        sync: false
      - key: LANGEXTRACT_LLM_PROVIDER
        sync: false
      - key: LANGEXTRACT_LLM_KEY
        sync: false
      - key: LANGEXTRACT_MODEL
        sync: false

# Data stores are external (free tiers, no expiry):
#   - Postgres → Supabase   (set DATABASE_URL in the dashboard)
#   - Redis    → Upstash     (set REDIS_URL in the dashboard; use the rediss:// TLS URL)
